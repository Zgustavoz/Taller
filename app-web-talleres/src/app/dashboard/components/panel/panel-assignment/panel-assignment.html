<div
  class="card bg-base-100 shadow-sm w-full h-full p-6 rounded-xl border border-slate-200 transition-all hover:shadow-lg hover:shadow-slate-200/50 flex flex-col items-center justify-between">

  <header class="w-full text-left mb-4">
    <h2 class="font-black text-lg uppercase tracking-tight">Estado de Asignaciones</h2>
  </header>

  <div class="flex-1 flex items-center justify-center py-4">
    <div class="radial-progress bg-base-200 text-primary border-base-200 border-4 shadow-inner"
      style="--value:100; --size:12rem; --thickness: 1rem;" aria-valuenow="100" role="progressbar">
      <span class="text-3xl font-black text-base-content">100%</span>
    </div>
  </div>

  <footer class="w-full space-y-3 pt-4 border-t border-base-200">
    <div class="flex items-center justify-between w-full">
      <div class="flex items-center gap-2">
        <div class="status status-primary"></div>
        <p class="text-sm font-medium">Aceptados</p>
      </div>
      <p class="font-bold tabular-nums">{{ acceptedPercentage() }}%</p>
    </div>

    <div class="flex items-center justify-between w-full">
      <div class="flex items-center gap-2">
        <div class="status bg-base-300"></div>
        <p class="text-sm font-medium opacity-70">Rechazados</p>
      </div>
      <p class="font-bold tabular-nums opacity-70">{{ rejectedPercentage() }}%</p>
    </div>
  </footer>
</div>
