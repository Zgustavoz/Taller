<div class="drawer lg:drawer-open">
  <input [id]="drawerId" type="checkbox" class="drawer-toggle" />
  <div class="drawer-content">
    <!-- Navbar -->
    <app-navbar [drawerId]="drawerId" />
    <!-- Page content here -->
    <main class="p-4 md:p-6 min-h-screen pb-12">
      <router-outlet />
    </main>
  </div>

  <app-side-menu [drawerId]="drawerId" />
</div>
